name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Public validation
        run: python3 scripts/validate_public.py
      - name: Generated docs are current
        run: python3 scripts/build_index.py --check
      - name: Python compile
        run: python3 -m py_compile scripts/build_index.py scripts/check_install.py scripts/check_markdown_links.py scripts/install_local.py scripts/validate_public.py
      - name: Markdown links
        run: python3 scripts/check_markdown_links.py
      - name: Install dry run
        run: python3 scripts/install_local.py --symlink-skills --dry-run --skill-home /tmp/elon-musk-skills-test
      - name: Unit tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s tests -v
